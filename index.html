<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f5e9c" />
    <title>Wellness</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#c8d8ef",
              "on-secondary-fixed": "#082f49",
              "on-error": "#ffffff",
              "surface-container": "#e2edff",
              "on-background": "#0f172a",
              "error-container": "#ffdad6",
              "inverse-surface": "#172033",
              "on-secondary-container": "#075985",
              "surface-variant": "#d7e7fb",
              "secondary": "#0284c7",
              "tertiary": "#075985",
              "on-tertiary-container": "#dbeafe",
              "tertiary-container": "#0e7490",
              "on-primary-container": "#dbeafe",
              "surface-bright": "#f4f8ff",
              "primary-fixed-dim": "#93c5fd",
              "primary-container": "#0b4a78",
              "error": "#ba1a1a",
              "on-surface-variant": "#334155",
              "on-tertiary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "outline": "#64748b",
              "on-secondary": "#ffffff",
              "primary-fixed": "#dbeafe",
              "on-tertiary-fixed-variant": "#075985",
              "surface-tint": "#0f5e9c",
              "tertiary-fixed": "#cffafe",
              "on-surface": "#0f172a",
              "secondary-fixed-dim": "#bfdbfe",
              "secondary-fixed": "#dbeafe",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#075985",
              "surface-container-low": "#eaf3ff",
              "surface": "#f4f8ff",
              "outline-variant": "#b8c7d9",
              "on-primary-fixed-variant": "#0c4a6e",
              "surface-container-high": "#d8eaff",
              "inverse-primary": "#93c5fd",
              "primary": "#0f5e9c",
              "on-primary-fixed": "#061a2f",
              "on-tertiary-fixed": "#071a2c",
              "background": "#f4f8ff",
              "inverse-on-surface": "#eaf3ff",
              "secondary-container": "#7dd3fc",
              "surface-container-highest": "#d7e7fb",
              "tertiary-fixed-dim": "#93c5fd",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xxl: "48px",
              md: "16px",
              xs: "4px",
              gutter: "16px",
              xl: "32px",
              margin: "24px",
              unit: "4px",
              sm: "8px",
              lg: "24px",
              "stack-md": "16px",
              "stack-sm": "8px",
              "stack-lg": "24px",
              "section-gap": "40px",
              "margin-page": "20px",
            },
            fontFamily: {
              "body-md": ["Inter"],
              "caption": ["Inter"],
              "h3": ["Inter"],
              "h2": ["Inter"],
              "body-lg": ["Inter"],
              "h1": ["Inter"],
              "label-md": ["Inter"],
              "body-sm": ["Inter"],
              "label-caps": ["Inter"],
              "stat-display": ["Inter"],
            },
            fontSize: {
              "body-md": [
                "16px",
                { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" },
              ],
              "caption": [
                "12px",
                { lineHeight: "1.4", letterSpacing: "0", fontWeight: "400" },
              ],
              "h3": [
                "24px",
                { lineHeight: "1.4", letterSpacing: "0", fontWeight: "600" },
              ],
              "h2": [
                "32px",
                { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" },
              ],
              "body-lg": [
                "18px",
                { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" },
              ],
              "h1": [
                "40px",
                { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" },
              ],
              "label-md": [
                "14px",
                { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "500" },
              ],
              "body-sm": [
                "15px",
                { lineHeight: "1.5", letterSpacing: "0em", fontWeight: "400" },
              ],
              "label-caps": [
                "12px",
                { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" },
              ],
              "stat-display": [
                "48px",
                { lineHeight: "1", letterSpacing: "-0.04em", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-background text-on-surface font-body-md antialiased pb-24">
    <header
      class="sticky top-0 z-50 border-b border-outline-variant/80 bg-surface/90 backdrop-blur-xl"
    >
      <div class="mx-auto flex h-16 max-w-lg items-center justify-between px-5">
        <div class="flex items-center gap-3">
          <div
            class="grid h-9 w-9 place-items-center rounded-2xl bg-primary-container text-sm font-semibold text-on-primary shadow-[0_6px_18px_rgba(15,94,156,0.18)]"
          >
            S
          </div>
          <div>
            <p
              class="text-[10px] font-semibold uppercase tracking-[0.18em] text-on-surface-variant"
            >
              Wellness
            </p>
            <h1 class="text-lg font-semibold tracking-tight text-on-surface">
              Sudheer
            </h1>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button
            id="installButton"
            class="hidden rounded-full bg-primary px-3 py-2 text-[12px] font-semibold text-on-primary shadow-[0_10px_24px_rgba(15,94,156,0.18)] transition-all hover:opacity-90 active:scale-95"
            type="button"
          >
            Install
          </button>
          <button
            class="grid h-10 w-10 place-items-center rounded-full bg-surface-container-low text-on-surface transition-all hover:bg-surface-container active:scale-95"
            type="button"
            aria-label="Notifications"
          >
            <span class="material-symbols-outlined">notifications</span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-lg space-y-10 px-margin-page pb-10 pt-stack-lg">
      <section
        id="view-status"
        data-view="status"
        class="view-section space-y-6"
      ></section>
      <section
        id="view-meals"
        data-view="meals"
        class="view-section space-y-6"
      ></section>
      <section
        id="view-foods"
        data-view="foods"
        class="view-section space-y-6"
      ></section>
      <section
        id="view-habits"
        data-view="habits"
        class="view-section space-y-6"
      ></section>
      <section
        id="view-weight"
        data-view="weight"
        class="view-section space-y-6"
      ></section>
    </main>

    <nav
      class="safe-bottom fixed bottom-0 left-0 z-50 w-full border-t border-outline-variant bg-surface/90 shadow-[0_-8px_28px_rgba(26,27,35,0.08)] backdrop-blur-xl"
    >
      <div class="mx-auto grid h-20 max-w-lg grid-cols-5 items-center px-1">
        <button
          class="nav-button nav-active flex flex-col items-center justify-center gap-1 text-primary transition-colors duration-200"
          data-view-target="status"
          type="button"
        >
          <span class="material-symbols-outlined">dashboard</span>
          <span class="text-[10px] font-medium">Status</span>
        </button>
        <button
          class="nav-button flex flex-col items-center justify-center gap-1 text-on-surface-variant transition-colors duration-200 hover:text-primary"
          data-view-target="meals"
          type="button"
        >
          <span class="material-symbols-outlined">restaurant_menu</span>
          <span class="text-[10px] font-medium">Meals</span>
        </button>
        <button
          class="nav-button flex flex-col items-center justify-center gap-1 text-on-surface-variant transition-colors duration-200 hover:text-primary"
          data-view-target="foods"
          type="button"
        >
          <span class="material-symbols-outlined">fact_check</span>
          <span class="text-[10px] font-medium">Foods</span>
        </button>
        <button
          class="nav-button flex flex-col items-center justify-center gap-1 text-on-surface-variant transition-colors duration-200 hover:text-primary"
          data-view-target="habits"
          type="button"
        >
          <span class="material-symbols-outlined">task_alt</span>
          <span class="text-[10px] font-medium">Habits</span>
        </button>
        <button
          class="nav-button flex flex-col items-center justify-center gap-1 text-on-surface-variant transition-colors duration-200 hover:text-primary"
          data-view-target="weight"
          type="button"
        >
          <span class="material-symbols-outlined">monitor_weight</span>
          <span class="text-[10px] font-medium">Weight</span>
        </button>
      </div>
    </nav>

    <div
      id="toast"
      class="pointer-events-none fixed left-1/2 top-5 z-[60] hidden -translate-x-1/2 rounded-full bg-on-surface px-4 py-2 text-sm font-medium text-surface shadow-[0_14px_30px_rgba(26,27,35,0.18)]"
      role="status"
      aria-live="polite"
    ></div>

    <script src="app.js"></script>
  </body>
</html>
